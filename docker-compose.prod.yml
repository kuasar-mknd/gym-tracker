x-app-env: &app-env
    APP_KEY: ${APP_KEY}
    APP_URL: ${APP_URL}
    ASSET_URL: ${APP_URL}
    APP_ENV: production
    APP_DEBUG: ${APP_DEBUG:-false}
    GOMAXPROCS: 2

    # Database
    DB_CONNECTION: mysql
    DB_HOST: db
    DB_PORT: 3306
    DB_DATABASE: ${DB_DATABASE}
    DB_USERNAME: ${DB_USERNAME}
    DB_PASSWORD: ${DB_PASSWORD}

    # Redis / Queue
    REDIS_HOST: redis
    REDIS_PASSWORD: ${REDIS_PASSWORD}
    REDIS_PORT: 6379
    SESSION_DRIVER: redis
    CACHE_STORE: redis
    QUEUE_CONNECTION: redis

    # Email Configuration
    MAIL_MAILER: smtp
    MAIL_HOST: ${MAIL_HOST}
    MAIL_PORT: ${MAIL_PORT}
    MAIL_USERNAME: ${MAIL_USERNAME}
    MAIL_PASSWORD: ${MAIL_PASSWORD}
    MAIL_ENCRYPTION: ${MAIL_ENCRYPTION}
    MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
    MAIL_FROM_NAME: '${MAIL_FROM_NAME}'

    # Monitoring (reduced sampling for DS218+ performance)
    SENTRY_DSN: ${SENTRY_DSN}
    SENTRY_TRACES_SAMPLE_RATE: 0.2
    SENTRY_PROFILES_SAMPLE_RATE: 0.1
    SENTRY_SEND_DEFAULT_PII: 'true'

services:
    app:
        image: ghcr.io/kuasar-mknd/gym-tracker:v1
        restart: always
        ports:
            - 8888:80
        environment:
            <<: *app-env
            # Security & Admin
            ADMIN_ALLOWED_IPS: ${ADMIN_ALLOWED_IPS}
            # Server Optimization
            OCTANE_SERVER: frankenphp
            FRANKENPHP_WAIT_FOR_WORKER: '60s'
            LOG_CHANNEL: stderr
        deploy:
            resources:
                limits:
                    memory: 1G
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:80/up']
            interval: 30s
            timeout: 5s
            start_period: 60s
            retries: 3
        networks:
            - frontend
            - backend
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_started

    db:
        image: mysql:8.4
        restart: always
        command: >
            --innodb-buffer-pool-size=256M
            --innodb-log-file-size=64M
            --max-connections=50
            --key-buffer-size=32M
            --tmp-table-size=32M
            --max-heap-table-size=32M
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
        volumes:
            - db_data:/var/lib/mysql
        deploy:
            resources:
                limits:
                    memory: 1G
        healthcheck:
            test: ['CMD', 'mysqladmin', 'ping', '-p${DB_PASSWORD}']
            interval: 15s
            retries: 5
            timeout: 5s
            start_period: 30s
        networks:
            - backend

    redis:
        image: redis:7.4-alpine
        restart: always
        command: >
            redis-server
            --requirepass ${REDIS_PASSWORD}
            --maxmemory 128mb
            --maxmemory-policy allkeys-lru
            --appendonly yes
            --appendfsync everysec
            --save 60 1000
        volumes:
            - redis_data:/data
        deploy:
            resources:
                limits:
                    memory: 256M
        healthcheck:
            test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
            interval: 15s
            timeout: 5s
            retries: 3
        networks:
            - backend

    worker:
        image: ghcr.io/kuasar-mknd/gym-tracker:v1
        restart: always
        command: php artisan horizon
        environment:
            <<: *app-env
        deploy:
            resources:
                limits:
                    memory: 512M
        healthcheck:
            test: ['CMD', 'php', 'artisan', 'horizon:status']
            interval: 60s
            timeout: 10s
            start_period: 30s
            retries: 3
        networks:
            - backend
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy

networks:
    frontend:
    backend:
        internal: true

volumes:
    db_data:
    redis_data:
