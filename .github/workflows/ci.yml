name: CI

on:
    push:
        branches: ['main']
        tags: ['v*']
    pull_request:
        branches: ['main']

permissions:
    contents: read

jobs:
    setup-php:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, readline
                  coverage: none
                  tools: composer:v2

            - name: Cache Vendor Folder
              id: cache-vendor
              uses: actions/cache@v5
              with:
                  path: vendor
                  key: ${{ runner.os }}-vendor-${{ hashFiles('**/composer.lock') }}

            - name: Install PHP Dependencies
              if: steps.cache-vendor.outputs.cache-hit != 'true'
              run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    frontend-build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 20
                  cache: 'npm'

            - name: Install Node Dependencies
              run: npm ci

            - name: Build Assets
              run: npm run build

            - name: Upload Build Artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: build-assets
                  path: public/build

    laravel-tests:
        runs-on: ubuntu-latest
        needs: [setup-php, frontend-build]
        services:
            mysql:
                image: mysql:8.4
                env:
                    MYSQL_ALLOW_EMPTY_PASSWORD: yes
                    MYSQL_DATABASE: gym_tracker_testing
                ports:
                    - 3306:3306
                options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Download Build Artifacts
              uses: actions/download-artifact@v8
              with:
                  name: build-assets
                  path: public/build

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, mysql, pdo_mysql, bcmath, soap, intl, readline
                  coverage: none
                  tools: composer:v2

            - name: Restore Vendor Folder
              uses: actions/cache@v5
              with:
                  path: vendor
                  key: ${{ runner.os }}-vendor-${{ hashFiles('**/composer.lock') }}

            - name: Prepare Application
              run: |
                  cp .env.example .env
                  php artisan key:generate

            - name: Execute tests
              env:
                  DB_CONNECTION: mysql
                  DB_HOST: 127.0.0.1
                  DB_PORT: 3306
                  DB_DATABASE: gym_tracker_testing
                  DB_USERNAME: root
                  TELESCOPE_ENABLED: false
              run: php artisan test --parallel --processes=4

    browser-tests:
        runs-on: ubuntu-latest
        needs: [setup-php, frontend-build]
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Download Build Artifacts
              uses: actions/download-artifact@v8
              with:
                  name: build-assets
                  path: public/build

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, readline
                  coverage: none
                  tools: composer:v2

            - name: Restore Vendor Folder
              uses: actions/cache@v5
              with:
                  path: vendor
                  key: ${{ runner.os }}-vendor-${{ hashFiles('**/composer.lock') }}

            - name: Prepare Dusk Environment
              run: |
                  # Create fresh .env
                  rm -f .env.testing .env.dusk.local .env.example
                  cat <<EOF > .env
                  APP_NAME=GymTracker
                  APP_ENV=testing
                  APP_KEY=$(TELESCOPE_ENABLED=false php artisan key:generate --show --no-ansi)
                  APP_DEBUG=true
                  APP_URL=http://127.0.0.1:8000
                  
                  DB_CONNECTION=sqlite
                  DB_DATABASE=database/dusk.sqlite
                  
                  SESSION_DRIVER=cookie
                  CACHE_STORE=array
                  QUEUE_CONNECTION=sync
                  MAIL_MAILER=array
                  
                  TELESCOPE_ENABLED=false
                  PULSE_ENABLED=false
                  
                  DUSK_DRIVER_URL=http://127.0.0.1:9515
                  SANCTUM_STATEFUL_DOMAINS=127.0.0.1:8000
                  EOF
                  chmod -R 777 storage bootstrap/cache
                  mkdir -p database
                  touch database/dusk.sqlite
                  chmod -R 777 database
                  
                  # DISABLE TELESCOPE GLOBALLY (even harder)
                  mkdir -p config
                  echo "<?php return ['enabled' => false, 'watchers' => []];" > config/telescope.php
                  
                  php artisan config:clear
                  php artisan view:clear
                  php artisan route:clear
                  
                  # Setup database
                  php artisan migrate:fresh --seed --force

            - name: Install Chrome Driver
              run: php artisan dusk:chrome-driver --detect

            - name: Start Chrome Driver
              run: ./vendor/laravel/dusk/bin/chromedriver-linux --port=9515 &

            - name: Run Dusk Tests
              run: |
                  # Start server with ALL env vars
                  export PHP_CLI_SERVER_WORKERS=4
                  TELESCOPE_ENABLED=false DB_CONNECTION=sqlite DB_DATABASE=database/dusk.sqlite APP_ENV=testing php artisan serve --host=127.0.0.1 --port=8000 --no-reload > storage/logs/serve.log 2>&1 &
                  # Wait for server
                  timeout 30s bash -c 'until curl -s http://127.0.0.1:8000 > /dev/null; do sleep 1; done'

                  # Run dusk
                  TELESCOPE_ENABLED=false DB_CONNECTION=sqlite DB_DATABASE=database/dusk.sqlite APP_ENV=testing php artisan dusk

            - name: Dump Logs on Failure
              if: failure()
              run: |
                  echo "--- Laravel Log ---"
                  tail -n 100 storage/logs/laravel.log || echo "No laravel log found"
                  echo "--- Serve Log ---"
                  cat storage/logs/serve.log || echo "No serve log found"

            - name: Sanitize Screenshot Filenames
              if: failure()
              run: |
                  if [ -d "tests/Browser/screenshots" ]; then
                    find tests/Browser/screenshots -name "*.png" | while read -r file; do
                      new_file=$(echo "$file" | tr -d '"' | tr ':' '_' | tr '<' '_' | tr '>' '_' | tr '|' '_' | tr '*' '_' | tr '?' '_')
                      if [ "$file" != "$new_file" ]; then
                        mv "$file" "$new_file"
                      fi
                    done
                  fi

            - name: Upload Test Screenshots
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: dusk-screenshots
                  path: tests/Browser/screenshots

            - name: Upload Test Logs
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: dusk-logs
                  path: tests/Browser/logs

    lint:
        runs-on: ubuntu-latest
        needs: setup-php
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, readline
                  coverage: none
                  tools: composer:v2

            - name: Restore Vendor Folder
              uses: actions/cache@v5
              with:
                  path: vendor
                  key: ${{ runner.os }}-vendor-${{ hashFiles('**/composer.lock') }}

            - name: PHP Lint (Pint)
              run: ./vendor/bin/pint --test

    audit:
        runs-on: ubuntu-latest
        needs: [setup-php]
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, readline
                  coverage: none
                  tools: composer:v2

            - name: Restore Vendor Folder
              uses: actions/cache@v5
              with:
                  path: vendor
                  key: ${{ runner.os }}-vendor-${{ hashFiles('**/composer.lock') }}

            - name: Composer Audit
              run: composer audit

            - name: PHP Insights
              run: php artisan insights --no-interaction --min-quality=90 --min-complexity=90 --min-architecture=90 --min-style=90

            - name: Larastan Analysis
              run: ./vendor/bin/phpstan analyse --memory-limit=2G

            - name: Rector (Dry Run)
              run: ./vendor/bin/rector process --dry-run

    build-image:
        strategy:
            matrix:
                platform: [linux/amd64, linux/arm64]
        runs-on: ubuntu-latest
        needs: [laravel-tests, browser-tests, audit, lint]
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels) for Docker
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/${{ github.repository }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  platforms: ${{ matrix.platform }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    merge:
        runs-on: ubuntu-latest
        needs: build-image
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
            REGISTRY: ghcr.io
            IMAGE_NAME: ${{ github.repository }}
        steps:
            - name: Download digests
              uses: actions/download-artifact@v8
              with:
                  path: /tmp/digests
                  pattern: digests-*
                  merge-multiple: true

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Create manifest list and push
              working-directory: /tmp/digests
              run: |
                  docker buildx imagetools create $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *) \
                  --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
                  $(echo "${{ steps.meta.outputs.tags }}" | xargs -I {} echo "--tag {}")
